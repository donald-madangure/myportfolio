<div class="container mt-5 mb-5 pt-5">

    <div class="mb-2 mt-5">
        <div class="mt-5">
            <button class="btn btn-outline-info mb-2 me-2" (click)="isCollapsed =! isCollapsed">Filter</button>
            <button class="btn btn-outline-warning mb-2" (click)="ResetFilters()" [hidden]="!filtering">Reset</button>
        </div>
        
        <div [collapse]="isCollapsed" [isAnimated]="true">
            <div class="mb-2 shadow-sm border border-light rounded" style="width: 250px;">
                <form>
                    <div class="row mx-0">
                        <div class="col text-light">
                            <small class="cont"><b>Languanges:</b></small>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "java" (change)="Filter()" name="Java">
                                    <label class="form-check-label small">Java</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "javascript" (change)="Filter()" name="Javascript">
                                    <label class="form-check-label small">Javascript</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "rxjs" (change)="Filter()" name="Typescript">
                                    <label class="form-check-label small">RxJS</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "typescript" (change)="Filter()" name="Typescript">
                                    <label class="form-check-label small">Typescript</label>
                                </div>
                            </div>
                        </div>
                        <div class="col text-light">
                            <small class="cont"><b>Frameworks:</b></small>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "angular" (change)="Filter()" name="Angular">
                                    <label class="form-check-label small">Angular</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "react" (change)="Filter()" name="React">
                                    <label class="form-check-label small">React</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "ngzorro" (change)="Filter()" name="NGZORRO">
                                    <label class="form-check-label small">NG-ZORRO</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "bootstrap" (change)="Filter()" name="bootstrap">
                                    <label class="form-check-label small">Bootstrap</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input position-static me-2" [(ngModel)] = "tailwind" (change)="Filter()" name="tailwind">
                                    <label class="form-check-label small">Tailwind</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="row">
        <div *ngFor="let project of projects" class="col-lg-4 col mb-4" style="max-width: 800px;min-width: 800;">
            <app-projects-card [project]="project"></app-projects-card>
        </div>
    
    </div>
</div>
